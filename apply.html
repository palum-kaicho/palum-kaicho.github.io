<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>応募フォーム｜Gemaris</title>

<meta name="description"
content="Gemaris所属ライバー応募フォーム">

<link rel="stylesheet"
href="css/style.css">

<style>
  .apply-form {
    max-width: 600px;
    margin: 0 auto;
    padding: 0 15px;
  }
/* --- 修正版ラベルスタイル（バッジを絶対に右側に固定する） --- */
  .form-group label {
    font-weight: 600;
    margin-bottom: 8px;
    color: #2b2b2b;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: space-between; /* 🚨 文字とバッジを綺麗に左右両端に割り振る */
    gap: 10px;
    width: 100%;
    box-sizing: border-box;
  }
  .form-group label {
    font-weight: 600;
    margin-bottom: 8px;
    color: #2b2b2b;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  
  /* 必須・任意の視覚的バッジ（絶対に縮まない・改行させない） */
  .badge-required, .badge-optional {
    flex-shrink: 0; /* 🚨 画面が狭くなっても絶対にバッジ自体を縮ませない */
    white-space: nowrap; /* 🚨 バッジの中の文字を絶対に改行させない */
    font-size: 0.7rem;
    padding: 3px 8px; /* 縦横のパディングを少し広げて綺麗に */
    border-radius: 4px;
    font-weight: bold;
    line-height: 1.2;
    text-align: center;
  }

  .badge-required {
    background-color: #9c2a2a;
    color: #ffffff;
  }
  
  .badge-optional {
    background-color: #666666;
    color: #ffffff;
  }

  /* 入力要素を画面幅いっぱいに綺麗に広げる */
  .form-group input[type="text"],
  .form-group select,
  .form-group textarea {
    width: 100% !important;
    max-width: 100% !important;
    box-sizing: border-box;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 1rem;
    background-color: #fff;
  }
  .form-group select {
    cursor: pointer;
    height: auto;
  }
</style>

</head>

<body>
<header class="header">
    <div class="container header-inner">
      <a href="index.html">
        <img src="images/logo.png" alt="Gemaris Logo" class="logo">
      </a>
      <button class="hamburger" id="js-hamburger" aria-label="メニューを開く">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-menu" id="js-nav-menu">
        <a href="index.html">TOP</a>
        <a href="index.html#plans">サポート・プラン</a>
        <a href="index.html#faq">FAQ</a>
        <a href="index.html#recruit-teaser">リクルート</a>
        <a href="index.html#story-section">インタビュー</a>
        <a href="index.html#staff-teaser">スタッフ</a>
        <a href="apply.html" class="apply-btn">応募はこちら</a>
      </nav>
    </div>
  </header>
  <section class="page-hero section" style="padding: 40px 0 20px 0; background-color: #faf7f2;">
  <div class="container" style="max-width: 600px; margin: 0 auto; padding: 0 15px;">
    <div class="apply-hero-image-box" style="width: 100%; max-width: 560px; margin: 0 auto;">
      <img src="images/apply.png" alt="Gemaris 応募フォーム：Gemarisに興味を持っていただきありがとうございます。下記フォームよりご応募ください。確認後、担当者よりご連絡いたします。" style="width: 100%; height: auto; display: block; border-radius: 12px; box-shadow: 0 10px 30px rgba(215, 201, 182, 0.25);">
    </div>
  </div>
</section>

<section class="section">

<div class="container">

<form
action="https://ssgform.com/s/8dTiH90PLkhn"
method="post"
enctype="multipart/form-data"
id="js-apply-form"
class="apply-form">

  <input type="hidden" name="_next" value="https://live-gemaris.com/thanks.html">

  <div class="form-group">
    <label>
      希望職種 <span class="badge-required">必須</span>
    </label>
    <select name="job_type" required>
      <option value="">選択してください</option>
      <option value="ライバー">ライバー</option>
      <option value="マネージャー">マネージャー</option>
      <option value="スカウト">スカウト</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      希望プラン <span class="badge-required">必須</span>
    </label>
    <select name="plan_type" required>
      <option value="">選択してください</option>
      <option value="セルフプロ">セルフプロ</option>
      <option value="フルサポート">フルサポート</option>
      <option value="未定">未定</option>
      <option value="ライバー以外（マネージャー・スカウト等）">ライバー以外（マネージャー・スカウト等）</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      お名前 <span class="badge-required">必須</span>
    </label>
    <input type="text" name="name" required>
  </div>

  <div class="form-group">
    <label>
      ふりがな <span class="badge-required">必須</span>
    </label>
    <input type="text" name="kana" required>
  </div>

  <div class="form-group">
    <label>
      年齢 <span class="badge-required">必須</span>
    </label>
    <select name="age" required>
      <option value="">選択してください</option>
      <option value="18歳未満">18歳未満</option>
      <option value="18〜22歳">18〜22歳</option>
      <option value="23〜29歳">23〜29歳</option>
      <option value="30〜39歳">30〜39歳</option>
      <option value="40歳以上">40歳以上</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      性別 <span class="badge-required">必須</span>
    </label>
    <select name="gender" required>
      <option value="">選択してください</option>
      <option value="女性">女性</option>
      <option value="男性">男性</option>
      <option value="その他">その他</option>
      <option value="回答しない">回答しない</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      配信経験 <span class="badge-required">必須</span>
    </label>
    <select name="experience" required>
      <option value="">選択してください</option>
      <option value="未経験">未経験</option>
      <option value="少しだけある">少しだけある</option>
      <option value="現在活動中">現在活動中</option>
      <option value="過去に活動していた">過去に活動していた</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      使用予定アプリ <span class="badge-required">必須</span>
    </label>
    <select name="platform" required>
      <option value="">選択してください</option>
      <option value="Palmu">Palmu</option>
      <option value="Pococha">Pococha</option>
      <option value="ふわっち">ふわっち</option>
      <option value="ColorSing">ColorSing</option>
      <option value="未定">未定</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      利用頻度の高いツール（複数選択可） <span class="badge-required">必須</span>
    </label>
    <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 5px; width: 100%;">
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="main_sns_tool[]" value="X"> X</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="main_sns_tool[]" value="Instagram"> Instagram</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="main_sns_tool[]" value="Threads"> Threads</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="main_sns_tool[]" value="TikTok"> TikTok</label>
      <label style="font-weight: normal; width: auto; margin: 0; pointer-events: auto; cursor: pointer;"><input type="checkbox" name="main_sns_tool[]" value="YouTube"> YouTube</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="main_sns_tool[]" value="その他"> その他</label>
    </div>
  </div>

  <div class="form-group">
    <label>
      連絡可能なSNS・ツール（複数選択可） <span class="badge-required">必須</span>
    </label>
    <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 5px; width: 100%;">
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="contact_sns_type[]" value="LINE"> LINE</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="contact_sns_type[]" value="Discord"> Discord</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="contact_sns_type[]" value="X"> X</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="contact_sns_type[]" value="Instagram"> Instagram</label>
      <label style="font-weight: normal; width: auto; margin: 0; cursor: pointer;"><input type="checkbox" name="contact_sns_type[]" value="メール"> メール</label>
    </div>
  </div>

<div class="form-group" style="
  border: 1px solid #f3ebe1;
  background-color: #fdfcf9;
  padding: 20px;
  border-radius: 8px;
  width: 100%;
  box-sizing: border-box;
">
  <label style="margin-bottom: 4px;">
    連絡先アカウント情報 <span class="badge-required">ABいずれか必須</span>
  </label>
  <p style="font-size: 0.8rem; color: #666; margin-bottom: 15px; line-height: 1.4;">
    上記でチェックを入れたツールの「ID・リンク・メールアドレスの入力」をするか、または「QRコード画像」を添付してください。
  </p>

  <div style="width: 100%; margin-bottom: 15px;">
    <span style="font-size: 0.85rem; font-weight: bold; color: #2b2b2b; display: block; margin-bottom: 6px;">方法A：IDや登録用リンク、メールアドレスを入力する</span>
    <textarea name="contact_sns_detail" id="js-sns-detail" rows="3" placeholder="例：XのIDは@xxxxx、メールアドレスはxxxx@xxxx.com など"></textarea>
  </div>

  <div style="width: 100%;">
    <span style="font-size: 0.85rem; font-weight: bold; color: #2b2b2b; display: block; margin-bottom: 6px;">方法B：アカウントのQRコード画像を添付する</span>
    <input type="file" name="sns_qr_code" id="js-sns-qr" accept="image/*" style="
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px dashed #9c2a2a;
      border-radius: 6px;
      background-color: #fff9f9;
      cursor: pointer;
    ">
    <span style="font-size: 0.75rem; color: #888; display: block; margin-top: 4px;">※LINEやDiscordなどのQRコード画面のスクリーンショットでもOKです</span>
  </div>
</div>

  <div class="form-group">
    <label>
      応募理由 <span class="badge-optional">任意</span>
    </label>
    <textarea name="reason" rows="6" placeholder="Gemarisに応募した理由や、やってみたいことなどがあれば自由にご記入ください"></textarea>
  </div>

  <div class="form-group">
    <label>
      自由記入欄 <span class="badge-optional">任意</span>
    </label>
    <textarea name="message" rows="6"></textarea>
  </div>

  <div class="form-group" style="text-align: center; margin-top: 40px; margin-bottom: 0;">
    <input 
      type="image" 
      src="images/apply02.png" 
      alt="応募する" 
      style="
        width: 100%;
        max-width: 560px;
        height: auto;
        border: none;
        outline: none;
        cursor: pointer;
        display: inline-block;
        transition: transform 0.2s ease, opacity 0.2s ease;
      "
      onmouseover="this.style.transform='scale(0.98)'; this.style.opacity='0.9';"
      onmouseout="this.style.transform='scale(1)'; this.style.opacity='1';"
    >
  </div>

</form>

</div>

</section>

<section class="section" style="padding: 30px 0 50px 0; background-color: #faf7f2;">
  <div class="container" style="max-width: 600px; margin: 0 auto; padding: 0 15px;">
    
    <a href="https://discord.gg/xxxxx" target="_blank" class="discord-banner-link" style="
      display: block;
      max-width: 560px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(215, 201, 182, 0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
    "
    onmouseover="this.style.transform='scale(0.98)';"
    onmouseout="this.style.transform='scale(1)';"
    >
      <img src="images/apply03.png" alt="応募前の相談も歓迎です。応募するか迷っている方も、まずはお気軽にご相談ください。Discordで相談する" style="width: 100%; height: auto; display: block; border: none;">
    </a>

  </div>
</section>

<footer class="footer">
    <div class="container">
      <div class="footer-logo">
        <img src="images/image(24).png" alt="Gemaris">
      </div>
      
      <div class="footer-links">
        <a href="index.html">TOP</a>
        <a href="support.html">サポート</a>
        <a href="plan.html">契約プラン</a>
        <a href="recruit.html">募集要項</a>
        <a href="staff.html">スタッフ紹介</a>
        <a href="apply.html">応募</a>
      </div>

      <div class="footer-sub-links" style="text-align: center; margin-top: 15px; margin-bottom: 15px;">
        <a href="company.html" style="font-size: 0.75rem; color: #888888; text-decoration: none; margin: 0 10px;">会社概要</a>
        <a href="privacy.html" style="font-size: 0.75rem; color: #888888; text-decoration: none; margin: 0 10px;">プライバシーポリシー</a>
      </div>

      <p class="copyright">© 2026 Gemaris LLC. All Rights Reserved.</p>
    </div>
  </footer>
  <script>
    // --- ① ハンバーガーメニューの処理 ---
    const hamburger = document.getElementById('js-hamburger');
    const navMenu = document.getElementById('js-nav-menu');

    if (hamburger && navMenu) {
        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('is-active');
        });

        const navLinks = navMenu.querySelectorAll('a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('is-active');
            });
        });
    }

    window.addEventListener('pageshow', (event) => {
        if (navMenu) {
            navMenu.classList.remove('is-active');
        }
    });

    // --- ② SNS連絡先の「片方必須」チェック処理 ---
    const applyForm = document.getElementById('js-apply-form');
    const snsDetail = document.getElementById('js-sns-detail');
    const snsQr = document.getElementById('js-sns-qr');

    if (applyForm && snsDetail && snsQr) {
        applyForm.addEventListener('submit', (event) => {
            const hasText = snsDetail.value.trim() !== '';
            const hasFile = snsQr.files.length > 0;

            if (!hasText && !hasFile) {
                event.preventDefault(); 
                alert('【連絡先アカウント情報】のご入力をお願いします。\n「方法A：IDやリンクの入力」または「方法B：QRコード画像の添付」のABいずれか必須となります！');
                snsDetail.focus();
            }
        });
    }
    
    // --- ③ URLパラメータによる希望職種＆希望プランの自動選択処理 ---
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const jobParam = urlParams.get('job');

        const jobSelect = document.querySelector('select[name="job_type"]');
        const planSelect = document.querySelector('select[name="plan_type"]'); // 💡 希望プランのセレクトボックスも取得！

        if (jobParam && jobSelect) {
            let targetJobValue = '';
            
            if (jobParam === 'driver') {
                targetJobValue = 'ライバー';
            } else if (jobParam === 'manager') {
                targetJobValue = 'マネージャー';
            } else if (jobParam === 'scout') {
                targetJobValue = 'スカウト';
            }

            // 職種を自動選択
            if (targetJobValue) {
                jobSelect.value = targetJobValue;
            }

            // 💡 【追加】マネージャーかスカウトの場合は、プランを「ライバー以外」に自動選択！
            if (planSelect && (jobParam === 'manager' || jobParam === 'scout')) {
                planSelect.value = 'ライバー以外（マネージャー・スカウト等）';
            }
        }
    });
</script>
</body>

</html>
