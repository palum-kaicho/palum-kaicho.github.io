  <!-- ==========================================
       ⚙️ JavaScript（超安定・比率固定レスポンシブ）
       ========================================== -->
<script>
/* ==================================================
   ハンバーガー
================================================== */
const hamburger = document.getElementById('js-hamburger');
const navMenu = document.getElementById('js-nav-menu');

if (hamburger && navMenu) {
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('is-active');
    navMenu.classList.toggle('is-active');
  });

  document.querySelectorAll('.nav-menu a').forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('is-active');
      navMenu.classList.remove('is-active');
    });
  });
}

/* ==================================================
   recruit.png
================================================== */
const indexImg = document.getElementById('js-index-recruit-img');
const indexArea = document.querySelector('map[name="index-recruit-map"] area');

const idxOriginalWidth = 1125;
const idxOriginalHeight = 2436;
const idxOriginalCoords = [145, 2170, 980, 2330];

function resizeIndexMap() {
  if (!indexImg || !indexArea) return;

  const rect = indexImg.getBoundingClientRect();

  const ratioX = rect.width / idxOriginalWidth;
  const ratioY = rect.height / idxOriginalHeight;

  const newCoords = [
    Math.round(idxOriginalCoords[0] * ratioX),
    Math.round(idxOriginalCoords[1] * ratioY),
    Math.round(idxOriginalCoords[2] * ratioX),
    Math.round(idxOriginalCoords[3] * ratioY)
  ];

  indexArea.setAttribute('coords', newCoords.join(','));
}

/* ==================================================
   support + plan
================================================== */
const combImg = document.getElementById('js-index-comb-img');
const combAreas = document.querySelectorAll('map[name="index-comb-map"] area');

const combOriginalWidth = 1125;
const combOriginalHeight = 2436;

const combOriginalCoords = [
  [90, 1240, 1035, 1360],
  [90, 2280, 1035, 2400]
];

function resizeCombMap() {
  if (!combImg || combAreas.length === 0) return;

  const rect = combImg.getBoundingClientRect();

  const ratioX = rect.width / combOriginalWidth;
  const ratioY = rect.height / combOriginalHeight;

  combAreas.forEach((area, index) => {
    const base = combOriginalCoords[index];
    if (!base) return;

    const newCoords = [
      Math.round(base[0] * ratioX),
      Math.round(base[1] * ratioY),
      Math.round(base[2] * ratioX),
      Math.round(base[3] * ratioY)
    ];

    area.setAttribute('coords', newCoords.join(','));
  });
}

// staff.png 用リサイズ
    const staffImg = document.getElementById('js-index-staff-img');
    const staffArea = document.querySelector('map[name="index-staff-map"] area');
    const stfOriginalWidth = 1125;
    const stfOriginalHeight = 2436;
    // 💡 1870（上すぎ）と 2170（下すぎ）のちょうど間、2080〜2240を狙い撃ちや！
    const stfOriginalCoords = [110, 2040, 1015, 2240];
function resizeStaffMap() {
  if (!staffImg || !staffArea) return;

  const rect = staffImg.getBoundingClientRect();

  // 💡 ここで stfOriginalWidth と stfOriginalHeight を使うように修正！
  const ratioX = rect.width / stfOriginalWidth;
  const ratioY = rect.height / stfOriginalHeight;

  // 💡 ここも stfOriginalCoords を使うように修正！
  const newCoords = [
    Math.round(stfOriginalCoords[0] * ratioX),
    Math.round(stfOriginalCoords[1] * ratioY),
    Math.round(stfOriginalCoords[2] * ratioX),
    Math.round(stfOriginalCoords[3] * ratioY)
  ];

  staffArea.setAttribute('coords', newCoords.join(','));
}

/* ==================================================
   イベント
================================================== */
function updateAllMaps() {
  resizeIndexMap();
  resizeCombMap();
  resizeStaffMap();
}

window.addEventListener('load', updateAllMaps);
window.addEventListener('resize', updateAllMaps);

/* ==================================================
   画像ロード保険
================================================== */
if (indexImg) {
  indexImg.complete
    ? resizeIndexMap()
    : indexImg.addEventListener('load', resizeIndexMap);
}

if (combImg) {
  combImg.complete
    ? resizeCombMap()
    : combImg.addEventListener('load', resizeCombMap);
}

if (staffImg) {
  staffImg.complete
    ? resizeStaffMap()
    : staffImg.addEventListener('load', resizeStaffMap);
}
</script>
